<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航空人員學科檢定系統</title>
<style>
  :root{
    --blue-text:#1456c2;
    --border:#c9d2dc;
    --red:#d32f2f;
    --gray-btn:#6c7686;
    --gray-btn-dark:#565f6e;
    --blue-btn:#1565c0;
    --blue-btn-dark:#0d4a96;
    --red-btn:#d32f2f;
    --red-btn-dark:#b32424;
    --row-label-bg:#fafbfc;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Microsoft JhengHei","PingFang TC","Heiti TC",Arial,sans-serif;
    background:#eef1f5;
    color:#222;
  }
  .hidden{display:none !important;}

  /* ---------- 頂部列 ---------- */
  .top-bar{
    background:#fff;
    border-bottom:1px solid var(--border);
    padding:14px 26px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .top-bar h1{margin:0;font-size:20px;font-weight:700;color:var(--blue-text);}
  .avatar-btn{
    width:34px;height:34px;border-radius:50%;
    background:#dbe3ee;color:#5a6b85;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:16px;border:1px solid var(--border);
    user-select:none;
  }
  .avatar-btn:hover{background:#c9d6e6;}

  /* ---------- 單元選擇畫面 ---------- */
  #unitScreen{max-width:700px;margin:50px auto;background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  #unitScreen .panel-head{background:var(--blue-text);color:#fff;padding:14px 22px;border-radius:6px 6px 0 0;font-size:16px;font-weight:600;}
  #unitScreen .panel-body{padding:22px 22px 26px;}
  #unitScreen p.hint{color:#5a6472;font-size:13px;margin-top:0;margin-bottom:16px;}
  .unit-list{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow-y:auto;}
  .unit-item{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);border-radius:4px;padding:12px 16px;background:#fafcff;}
  .unit-item.empty{background:#f5f6f8;}
  .unit-name{font-size:14px;font-weight:700;color:#163a63;}
  .unit-count{font-size:12px;color:#6b7686;margin-top:2px;}
  .btn-start{background:var(--blue-text);color:#fff;border:none;border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer;}
  .btn-start:hover{filter:brightness(1.1);}
  .btn-start:disabled{background:#aab4c2;cursor:not-allowed;}

  /* ---------- 題數選擇畫面 ---------- */
  #countScreen{max-width:520px;margin:60px auto;background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  #countScreen .panel-head{background:var(--blue-text);color:#fff;padding:14px 22px;border-radius:6px 6px 0 0;font-size:16px;font-weight:600;}
  #countScreen .panel-body{padding:24px 26px 28px;}
  #countScreen .row{margin-bottom:18px;}
  #countScreen label{display:block;font-size:13px;color:#3a4453;font-weight:700;margin-bottom:6px;}
  #countInput{
    width:100%;padding:10px 12px;font-size:16px;border:1px solid var(--border);border-radius:4px;
  }
  .count-actions{display:flex;gap:10px;margin-top:22px;}
  .count-actions button{flex:1;padding:11px 0;border-radius:5px;border:none;font-size:14px;font-weight:700;cursor:pointer;color:#fff;}

  /* ---------- 測驗畫面整體 ---------- */
  #quizScreen{max-width:1040px;margin:20px auto 60px;padding:0 16px;}

  table.info-table, table.question-table{
    width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);margin-bottom:14px;
  }
  table.info-table td, table.question-table td{
    border:1px solid var(--border);padding:12px 18px;font-size:14px;vertical-align:middle;
  }
  td.label-cell{background:var(--row-label-bg);color:var(--blue-text);font-weight:700;width:1%;white-space:nowrap;}
  td.label-cell .en{display:block;font-weight:500;font-size:11px;color:#5d7aa8;margin-top:2px;white-space:nowrap;}
  td.value-cell{color:#222;font-size:15px;}
  td.value-cell.red{color:var(--red);font-weight:700;}
  #timer.warn{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  table.question-table td.value-cell{line-height:1.7;}

  /* ---------- 按鈕列 ---------- */
  .nav-bar{display:grid;grid-template-columns:1fr 1fr 1.3fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .nav-bar button, .nav-bar select{height:62px;border-radius:6px;border:none;font-family:inherit;cursor:pointer;}
  .nav-bar button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#fff;font-size:14px;font-weight:700;line-height:1.3;transition:filter .15s;}
  .nav-bar button .en{font-size:11px;font-weight:500;opacity:.9;}
  .nav-bar button:hover{filter:brightness(1.08);}
  .nav-bar button:disabled{opacity:.45;cursor:not-allowed;filter:none;}
  .btn-gray{background:var(--gray-btn);}
  .btn-gray:hover{background:var(--gray-btn-dark);}
  .btn-blue{background:var(--blue-btn);}
  .btn-blue:hover{background:var(--blue-btn-dark);}
  .btn-red{background:var(--red-btn);}
  .btn-red:hover{background:var(--red-btn-dark);}
  #jumpSelect{border:1px solid var(--border);background:#fff;color:#222;font-size:15px;padding:0 10px;text-align:center;}

  /* ---------- 答案選項 ---------- */
  .option-row{display:flex;align-items:flex-start;gap:10px;padding:8px 4px;cursor:pointer;border-radius:4px;}
  .option-row:hover{background:#f3f7fd;}
  .option-row input{margin-top:3px;flex:0 0 auto;cursor:pointer;}
  .option-row label{font-size:15px;line-height:1.6;cursor:pointer;}

  /* ---------- 自訂彈窗 ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,30,45,.45);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal-box{background:#fff;border-radius:8px;max-width:380px;width:90%;padding:24px 24px 20px;box-shadow:0 8px 24px rgba(0,0,0,.25);text-align:center;}
  .modal-box p{font-size:15px;color:#27314a;line-height:1.6;margin:0 0 20px;}
  .modal-actions{display:flex;gap:12px;justify-content:center;}
  .modal-actions button{flex:1;padding:10px 0;border-radius:5px;border:none;font-size:14px;font-weight:700;cursor:pointer;color:#fff;}

  /* ---------- 結果畫面 ---------- */
  #resultScreen{max-width:880px;margin:40px auto 60px;padding:0 16px;}
  .score-card{
    background:#fff;border:1px solid var(--border);border-radius:6px;
    padding:30px 26px;margin-bottom:20px;text-align:center;
  }
  .score-card .score-label{font-size:13px;color:#6b7686;margin-bottom:8px;}
  .score-card .score-value{font-size:48px;font-weight:800;color:var(--blue-text);}
  .score-card .score-value.fail{color:var(--red);}
  .score-card .score-sub{font-size:13px;color:#6b7686;margin-top:6px;}
  table.result-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);}
  table.result-table th,table.result-table td{border:1px solid var(--border);padding:10px 12px;font-size:13px;text-align:left;vertical-align:top;}
  table.result-table th{background:var(--row-label-bg);color:var(--blue-text);}
  .ok{color:#2e7d32;font-weight:700;}
  .ng{color:var(--red);font-weight:700;}
  .blank{color:#9aa3af;font-weight:700;}

  /* ---------- 錯題過濾切換鍵 (Filter Tabs) ---------- */
  .filter-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 8px;
  }
  .filter-tab {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 700;
    border: 1px solid var(--border);
    background: #fff;
    color: #565f6e;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-tab:hover {
    background: #f0f4f8;
  }
  .filter-tab.active {
    background: var(--blue-text);
    color: #fff;
    border-color: var(--blue-text);
  }
  .filter-empty-hint {
    background: #fff;
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 40px;
    text-align: center;
    color: #6c7686;
    font-size: 15px;
  }

  /* ---------- Sticky 浮動按鈕列 ---------- */
  .sticky-action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.96);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    justify-content: center;
    gap: 16px;
    box-shadow: 0 -3px 12px rgba(0,0,0,0.08);
    z-index: 999;
  }
  .sticky-action-bar button {
    min-width: 140px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 700;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    color: #fff;
    transition: background 0.15s;
  }
  .btn-retry {
    background: var(--blue-btn);
  }
  .btn-retry:hover {
    background: var(--blue-btn-dark);
  }
  .btn-home {
    background: var(--gray-btn);
  }
  .btn-home:hover {
    background: var(--gray-btn-dark);
  }

  /* ---------- 逐題檢討卡片 ---------- */
  .review-card{background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:14px;overflow:hidden;}
  .review-head{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--row-label-bg);border-bottom:1px solid var(--border);
    padding:10px 16px;font-weight:700;color:#163a63;font-size:14px;
  }
  .review-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:10px;color:#fff;}
  .review-badge.ok{background:#2e7d32;}
  .review-badge.ng{background:var(--red);}
  .review-badge.blank{background:#9aa3af;}
  .review-body{padding:16px 18px 18px;}
  .review-question{font-size:15px;line-height:1.7;margin-bottom:14px;}
  .review-option{
    display:flex;align-items:flex-start;gap:8px;padding:8px 12px;
    border:1px solid var(--border);border-radius:4px;margin-bottom:6px;
    font-size:14px;line-height:1.6;
  }
  .review-option .opt-tag{
    margin-left:auto;flex:0 0 auto;font-size:11px;font-weight:700;
    padding:2px 9px;border-radius:10px;color:#fff;white-space:nowrap;
  }
  .review-option.is-correct{background:#eaf7ec;border-color:#2e7d32;}
  .review-option.is-correct .opt-tag{background:#2e7d32;}
  .review-option.is-wrong-selected{background:#fdecec;border-color:var(--red);}
  .review-option.is-wrong-selected .opt-tag{background:var(--red);}
</style>
</head>
<body>

<div class="top-bar">
  <h1>航空人員學科檢定系統</h1>
  <div class="avatar-btn" id="avatarBtn" title="返回單元選擇">👤</div>
</div>

<div id="unitScreen">
  <div class="panel-head">請選擇練習單元</div>
  <div class="panel-body">
    <p class="hint">選擇單元後，可自訂本次要測驗的題數，作答時間將依題數自動計算。</p>
    <div class="unit-list" id="unitList"></div>
  </div>
</div>

<div id="countScreen" class="hidden">
  <div class="panel-head" id="countPanelHead">設定測驗題數</div>
  <div class="panel-body">
    <div class="row">
      <label>本次要測驗的題數（題庫共 <span id="maxAvailableText">0</span> 題）</label>
      <input type="number" id="countInput" min="1" value="1">
    </div>
    <div class="count-actions">
      <button class="btn-gray" id="countBackBtn">返回單元選擇</button>
      <button class="btn-blue" id="countStartBtn">開始作答</button>
    </div>
  </div>
</div>

<div id="quizScreen" class="hidden">

  <table class="info-table">
    <tr>
      <td class="label-cell">剩餘時間<span class="en">Remaining Time</span></td>
      <td class="value-cell red" id="timer">00:00:00</td>
      <td class="label-cell">目前單元<span class="en">Current Unit</span></td>
      <td class="value-cell" id="unitNameCell">－</td>
    </tr>
    <tr>
      <td class="label-cell">題數<span class="en">Number of Questions</span></td>
      <td class="value-cell" id="totalCount">0</td>
      <td class="label-cell">未作答題數<span class="en">Unanswered Questions</span></td>
      <td class="value-cell" id="unansweredCount">0</td>
    </tr>
  </table>

  <div class="nav-bar">
    <button class="btn-gray" id="prevBtn"><span>← 上一題</span><span class="en">PREVIOUS</span></button>
    <button class="btn-red" id="finishBtn"><span>結束作答</span><span class="en">End Answering</span></button>
    <select id="jumpSelect"></select>
    <button class="btn-blue" id="findUnansweredBtn"><span>尋未答題</span><span class="en">Find unanswered</span></button>
    <button class="btn-gray" id="nextBtn"><span>下一題 →</span><span class="en">NEXT</span></button>
  </div>

  <table class="question-table">
    <tr>
      <td class="label-cell">題號<span class="en">Question No.</span></td>
      <td class="value-cell red" id="qNoCell">－</td>
    </tr>
    <tr>
      <td class="label-cell">題目<span class="en">Question</span></td>
      <td class="value-cell" id="questionText"></td>
    </tr>
    <tr>
      <td class="label-cell">考生答案<span class="en">Answer</span></td>
      <td class="value-cell red" id="answerCell">－</td>
    </tr>
    <tr>
      <td class="label-cell">答案選項<span class="en">Choices</span></td>
      <td class="value-cell"><div id="optionsArea"></div></td>
    </tr>
  </table>
</div>

<div id="resultScreen" class="hidden">
  <div class="score-card">
    <div class="score-label">本次測驗成績 SCORE</div>
    <div class="score-value" id="scoreValue">0</div>
    <div class="score-sub" id="scoreSub"></div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" id="filterAllBtn" onclick="filterReviewList('all')">全部題目</button>
    <button class="filter-tab" id="filterWrongBtn" onclick="filterReviewList('wrong')">僅看錯題</button>
  </div>

  <div id="reviewList"></div>

  <div style="height: 80px;"></div>

  <div class="sticky-action-bar">
    <button class="btn-retry" id="retryBtn">再測一次</button>
    <button class="btn-home" id="backBtn">回主頁 (選擇單元)</button>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="modalMessage"></p>
    <div class="modal-actions">
      <button id="modalCancelBtn" class="btn-gray" style="background:var(--gray-btn);">取消</button>
      <button id="modalConfirmBtn" class="btn-red" style="background:var(--red-btn);">確定</button>
    </div>
  </div>
</div>

<script src="m15_data.js"></script>

<script>
/* ============ 航空檢定題數對照設定 ============ */
const UNIT_CONFIG = {
  "M1 MATHEMATICS": { defaultCount: 32 },
  "M2 PHYSICS": { defaultCount: 52 },
  "M3 ELECTRICAL FUNDAMENTAL": { defaultCount: 52 },
  "M4 ELECTRONICS FUNDAMENTAL": { defaultCount: 20 },
  "M5 DIGITAL TECHNIQUES / ELECTRONIC INSTRUMENT SYSTEMS": { defaultCount: 40 },
  "M6 MATERIAL & HARDWARE": { defaultCount: 72 },
  "M7 MAINTENANCE PRACTICE": { defaultCount: 80 },
  "M8 AERODYNAMICS": { defaultCount: 20 },
  "M9 HUMAN FACTOR": { defaultCount: 20 },
  "M10 AVIATION LEGISLATION": { defaultCount: 40 },
  "M11 AEROPLANE AERO. STRUCTURE & SYSTEM": { defaultCount: 132 },
  "M15 GAS TURBINE ENGINE": { defaultCount: 92 },
  "M17 PROPELLER": { defaultCount: 32 }
};

/* ============ 空題庫容器（等待 JS 檔案注入題目） ============ */
const QUESTION_BANK = {
  "M1 MATHEMATICS": [],
  "M2 PHYSICS": [],
  "M3 ELECTRICAL FUNDAMENTAL": [],
  "M4 ELECTRONICS FUNDAMENTAL": [],
  "M5 DIGITAL TECHNIQUES / ELECTRONIC INSTRUMENT SYSTEMS": [],
  "M6 MATERIAL & HARDWARE": [],
  "M7 MAINTENANCE PRACTICE": [],
  "M8 AERODYNAMICS": [],
  "M9 HUMAN FACTOR": [],
  "M10 AVIATION LEGISLATION": [],
  "M11 AEROPLANE AERO. STRUCTURE & SYSTEM": [],
  "M15 GAS TURBINE ENGINE": [],
  "M17 PROPELLER": []
};

/* ============ 核心變數設定 ============ */
let currentUnit = "";
let questions = [];
let currentIdx = 0;
let userAnswers = {};
let timerInterval = null;
let currentReviewQuestions = [];

// DOM 元素
const unitScreen = document.getElementById('unitScreen');
const countScreen = document.getElementById('countScreen');
const quizScreen = document.getElementById('quizScreen');
const resultScreen = document.getElementById('resultScreen');

const unitList = document.getElementById('unitList');
const countInput = document.getElementById('countInput');
const maxAvailableText = document.getElementById('maxAvailableText');
const countPanelHead = document.getElementById('countPanelHead');

const timerEl = document.getElementById('timer');
const unitNameCell = document.getElementById('unitNameCell');
const totalCountEl = document.getElementById('totalCount');
const unansweredCountEl = document.getElementById('unansweredCount');

const qNoCell = document.getElementById('qNoCell');
const questionText = document.getElementById('questionText');
const answerCell = document.getElementById('answerCell');
const optionsArea = document.getElementById('optionsArea');
const jumpSelect = document.getElementById('jumpSelect');

const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const finishBtn = document.getElementById('finishBtn');
const findUnansweredBtn = document.getElementById('findUnansweredBtn');

const countBackBtn = document.getElementById('countBackBtn');
const countStartBtn = document.getElementById('countStartBtn');
const backBtn = document.getElementById('backBtn');
const retryBtn = document.getElementById('retryBtn');
const avatarBtn = document.getElementById('avatarBtn');

// 彈窗
const modalOverlay = document.getElementById('modalOverlay');
const modalMessage = document.getElementById('modalMessage');
const modalCancelBtn = document.getElementById('modalCancelBtn');
const modalConfirmBtn = document.getElementById('modalConfirmBtn');
let modalResolveFn = null;

/* ============ 基礎初始化 ============ */
function init() {
  // 將外部讀取進來的全域題目同步注入到 QUESTION_BANK 中
  if (window.M15_DATA && window.M15_DATA.length > 0) {
    QUESTION_BANK["M15 GAS TURBINE ENGINE"] = window.M15_DATA;
  }
  if (window.M11_DATA && window.M11_DATA.length > 0) {
    QUESTION_BANK["M11 AEROPLANE AERO. STRUCTURE & SYSTEM"] = window.M11_DATA;
  }

  renderUnitList();
  
  countBackBtn.addEventListener('click', () => {
    switchScreen(countScreen, unitScreen);
  });

  countStartBtn.addEventListener('click', startQuiz);
  
  prevBtn.addEventListener('click', () => navigate(-1));
  nextBtn.addEventListener('click', () => navigate(1));
  
  finishBtn.addEventListener('click', () => {
    showModal("您確定要結束作答並送出考卷嗎？").then(confirm => {
      if(confirm) doFinishQuiz();
    });
  });

  findUnansweredBtn.addEventListener('click', jumpToFirstUnanswered);
  
  jumpSelect.addEventListener('change', (e) => {
    currentIdx = parseInt(e.target.value, 10);
    showQuestion(currentIdx);
  });

  backBtn.addEventListener('click', () => {
    switchScreen(resultScreen, unitScreen);
  });

  retryBtn.addEventListener('click', () => {
    userAnswers = {};
    startQuizDirectly();
  });

  avatarBtn.addEventListener('click', () => {
    if(!quizScreen.classList.contains('hidden')) {
      showModal("目前正在測驗中，確定要強行返回單元選擇嗎？(作答紀錄將消失)").then(confirm => {
        if(confirm) {
          clearInterval(timerInterval);
          switchScreen(quizScreen, unitScreen);
        }
      });
    } else if(!countScreen.classList.contains('hidden')) {
      switchScreen(countScreen, unitScreen);
    } else if(!resultScreen.classList.contains('hidden')) {
      switchScreen(resultScreen, unitScreen);
    }
  });
}

function switchScreen(from, to) {
  from.classList.add('hidden');
  to.classList.remove('hidden');
  window.scrollTo(0,0);
}

/* ============ 渲染單元選單 ============ */
function renderUnitList() {
  unitList.innerHTML = "";
  Object.keys(QUESTION_BANK).forEach(name => {
    const arr = QUESTION_BANK[name] || [];
    const config = UNIT_CONFIG[name] || { defaultCount: 30 };
    const div = document.createElement('div');
    div.className = "unit-item" + (arr.length === 0 ? " empty" : "");
    
    div.innerHTML = `
      <div>
        <div class="unit-name">${name}</div>
        <div class="unit-count">可用題數：${arr.length} 題 （標準檢定：${config.defaultCount}題）</div>
      </div>
      <button class="btn-start" ${arr.length === 0 ? "disabled" : ""}>選擇此單元</button>
    `;
    
    if(arr.length > 0) {
      div.querySelector('.btn-start').addEventListener('click', () => {
        setupCountScreen(name);
      });
    }
    unitList.appendChild(div);
  });
}

function setupCountScreen(unitName) {
  currentUnit = unitName;
  const totalAvailable = QUESTION_BANK[unitName].length;
  const config = UNIT_CONFIG[unitName] || { defaultCount: 30 };

  countPanelHead.textContent = `設定測驗題數 - ${unitName}`;
  maxAvailableText.textContent = totalAvailable;
  countInput.max = totalAvailable;
  
  countInput.value = Math.min(totalAvailable, config.defaultCount); 
  
  switchScreen(unitScreen, countScreen);
}

/* ============ 隨機抽取題目並開始 ============ */
function startQuiz() {
  const total = QUESTION_BANK[currentUnit].length;
  let val = parseInt(countInput.value, 10);
  if(isNaN(val) || val < 1) val = 1;
  if(val > total) val = total;
  
  const pool = [...QUESTION_BANK[currentUnit]];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  questions = pool.slice(0, val);
  
  userAnswers = {};
  startQuizDirectly();
}

function startQuizDirectly() {
  if (resultScreen.classList.contains('hidden') === false) {
    resultScreen.classList.add('hidden');
  }
  countScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  
  currentIdx = 0;
  
  unitNameCell.textContent = currentUnit;
  totalCountEl.textContent = questions.length;
  updateUnansweredCount();
  
  buildJumpSelect();
  updateNavBar();
  showQuestion(currentIdx);
  
  const limitSec = Math.floor(questions.length * 1.25 * 60);
  startTimer(limitSec);
}

/* ============ 題目切換與渲染 ============ */
function showQuestion(idx) {
  if(idx < 0 || idx >= questions.length) return;
  currentIdx = idx;
  updateNavBar();
  
  const q = questions[idx];
  qNoCell.textContent = `第 ${idx + 1} 題 / 共 ${questions.length} 題 (題庫編號: No.${q.id})`;
  questionText.innerHTML = q.question.replace(/\n/g, '<br>');
  
  const userAns = userAnswers[q.id] || "";
  answerCell.textContent = userAns ? userAns : "尚未作答";
  
optionsArea.innerHTML = "";
  // 建立標準英文字母對照表，確保就算題目沒有 (A) 也能正確對應
  const optionLetters = ['A', 'B', 'C', 'D', 'E', 'F'];

  q.options.forEach((optText, index) => {
    if (!optText || optText.trim() === "") return;

    // 優先讀取題目自帶的 (A)，若無則依序給予字母
    const m = optText.match(/^\(([A-Za-z])\)/);
    const letter = m ? m[1].toUpperCase() : optionLetters[index];
    
    const row = document.createElement('div');
    row.className = "option-row";
    
    const radio = document.createElement('input');
    radio.type = "radio";
    // ✨ 關鍵修正：加上隨機陣列的當前 index 隔離，防止不同題目的 Radio 群組在網頁中互相干擾
    radio.name = `q_opt_idx_${currentIdx}_${q.id}`;
    radio.value = letter;
    if(letter === userAns) radio.checked = true;
    
    const label = document.createElement('label');
    label.innerHTML = optText.replace(/\n/g, '<br>');
    
    const handler = () => {
      radio.checked = true;
      userAnswers[q.id] = letter;
      answerCell.textContent = letter;
      updateUnansweredCount();
      buildJumpSelect();
    };
    
    row.addEventListener('click', handler);
    radio.addEventListener('click', (e) => {
      e.stopPropagation();
      handler();
    });
    
    row.appendChild(radio);
    row.appendChild(label);
    optionsArea.appendChild(row);
  });
}

function navigate(dir) {
  const target = currentIdx + dir;
  if(target >= 0 && target < questions.length) {
    showQuestion(target);
  }
}

function updateNavBar() {
  prevBtn.disabled = (currentIdx === 0);
  nextBtn.disabled = (currentIdx === questions.length - 1);
  jumpSelect.value = currentIdx;
}

function updateUnansweredCount() {
  let count = 0;
  questions.forEach(q => {
    if(!userAnswers[q.id]) count++;
  });
  unansweredCountEl.textContent = count;
}

function buildJumpSelect() {
  jumpSelect.innerHTML = "";
  questions.forEach((q, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    const hasAns = !!userAnswers[q.id];
    opt.textContent = `第 ${idx + 1} 題 ${hasAns ? '✓' : '★'}`;
    jumpSelect.appendChild(opt);
  });
  jumpSelect.value = currentIdx;
}

function jumpToFirstUnanswered() {
  const target = questions.findIndex(q => !userAnswers[q.id]);
  if(target !== -1) {
    showQuestion(target);
  } else {
    showModal("所有題目皆已作答完畢！", true);
  }
}

/* ============ 計時器模組 ============ */
function startTimer(durationSec) {
  if(timerInterval) clearInterval(timerInterval);
  let remain = durationSec;
  
  function updateTimerText() {
    if(remain <= 0) {
      timerEl.textContent = "00:00:00";
      timerEl.classList.remove('warn');
      clearInterval(timerInterval);
      showModal("作答時間已到！系統將自動為您交卷。", true).then(() => {
        doFinishQuiz();
      });
      return;
    }
    
    let h = Math.floor(remain / 3600);
    let m = Math.floor((remain % 3600) / 60);
    let s = remain % 60;
    
    timerEl.textContent = 
      (h < 10 ? "0"+h : h) + ":" + 
      (m < 10 ? "0"+m : m) + ":" + 
      (s < 10 ? "0"+s : s);
      
    if(remain <= 60) {
      timerEl.classList.add('warn');
    } else {
      timerEl.classList.remove('warn');
    }
  }
  
  remain--;
  updateTimerText();
  timerInterval = setInterval(() => {
    remain--;
    updateTimerText();
  }, 1000);
}

/* ============ 結束測驗與結果渲染 ============ */
function doFinishQuiz() {
  clearInterval(timerInterval);
  quizScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
  window.scrollTo(0,0);

  let correctCount = 0;
  
  currentReviewQuestions = questions.map(q => {
    const userAns = userAnswers[q.id] || "";
    const isCorrect = (userAns === q.answer);
    if(isCorrect) correctCount++;
    
    let badgeClass = 'blank';
    let badgeLabel = '未答';
    if(userAns) {
      if(isCorrect) {
        badgeClass = 'ok';
        badgeLabel = '正確';
      } else {
        badgeClass = 'ng';
        badgeLabel = '錯誤';
      }
    }
    
    return {
      ...q,
      userAns: userAns,
      isCorrect: isCorrect,
      badgeClass: badgeClass,
      badgeLabel: badgeLabel
    };
  });

  const score = questions.length > 0 ? Math.round((correctCount / questions.length) * 1000) / 10 : 0;
  const scoreValueEl = document.getElementById('scoreValue');
  const scoreSubEl = document.getElementById('scoreSub');
  
  scoreValueEl.textContent = score;
  scoreValueEl.classList.remove('fail');
  if(score < 70) scoreValueEl.classList.add('fail');
  scoreSubEl.textContent = `總題數：${questions.length} 題 / 答對：${correctCount} 題`;

  document.getElementById('filterAllBtn').classList.add('active');
  document.getElementById('filterWrongBtn').classList.remove('active');
  
  renderReviewList(currentReviewQuestions);
}

function renderReviewList(targetQuestions) {
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = "";

  if(targetQuestions.length === 0) {
    reviewList.innerHTML = `<div class="filter-empty-hint">目前沒有符合篩選條件的題目。</div>`;
    return;
  }

  targetQuestions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'review-card';

// 建立標準英文字母對照表
    const optionLetters = ['A', 'B', 'C', 'D', 'E', 'F'];

    const optionsHtml = q.options.map((optText, index) => {
      if (!optText || optText.trim() === "") return '';

      // 優先讀取題目自帶的 (A)，若無則依序給予字母
      const m = optText.match(/^\(([A-Za-z])\)/);
      const letter = m ? m[1].toUpperCase() : optionLetters[index];
      
      const isAnswerOption = (letter === q.answer);
      const isUserWrongPick = (letter === q.userAns && !q.isCorrect);
      
      let cls = 'review-option';
      let tagHtml = '';
      if (isAnswerOption){
        cls += ' is-correct';
        tagHtml = `<span class="opt-tag">正確答案${letter === q.userAns ? '・您的選擇' : ''}</span>`;
      } else if (isUserWrongPick){
        cls += ' is-wrong-selected';
        tagHtml = `<span class="opt-tag">您的選擇</span>`;
      }
      return `<div class="${cls}"><span>${optText.replace(/\n/g, '<br>')}</span>${tagHtml}</div>`;
    }).join('');

    card.innerHTML = `
      <div class="review-head">
        <span>第 ${idx + 1} 題（No.${q.id}）</span>
        <span class="review-badge ${q.badgeClass}">${q.badgeLabel}</span>
      </div>
      <div class="review-body">
        <div class="review-question">${q.question.replace(/\n/g, '<br>')}</div>
        ${optionsHtml}
      </div>
    `;
    reviewList.appendChild(card);
  });
}

function filterReviewList(type) {
  const allBtn = document.getElementById('filterAllBtn');
  const wrongBtn = document.getElementById('filterWrongBtn');

  if (type === 'wrong') {
    allBtn.classList.remove('active');
    wrongBtn.classList.add('active');
    const wrongQuestions = currentReviewQuestions.filter(q => q.isCorrect === false);
    renderReviewList(wrongQuestions);
  } else {
    wrongBtn.classList.remove('active');
    allBtn.classList.add('active');
    renderReviewList(currentReviewQuestions);
  }
}

/* ============ 自訂彈窗模組 ============ */
function showModal(msg, alertOnly = false) {
  modalMessage.textContent = msg;
  modalOverlay.classList.remove('hidden');
  
  if(alertOnly) {
    modalCancelBtn.classList.add('hidden');
  } else {
    modalCancelBtn.classList.remove('hidden');
  }
  
  return new Promise((resolve) => {
    modalResolveFn = resolve;
  });
}

modalConfirmBtn.addEventListener('click', () => {
  modalOverlay.classList.add('hidden');
  if(modalResolveFn) modalResolveFn(true);
});

modalCancelBtn.addEventListener('click', () => {
  modalOverlay.classList.add('hidden');
  if(modalResolveFn) modalResolveFn(false);
});

window.addEventListener('DOMContentLoaded', init);
</script>
